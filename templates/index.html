<!doctype html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <title>Call Light</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        h1 {
            color: #222;
        }

        table {
            border-collapse: collapse;
            background: white;
        }

        td {
            padding: 10px 16px;
            border: 1px solid #ddd;
        }

        td:first-child {
            font-weight: bold;
            width: 180px;
        }

    </style>

</head>

<body>

<h1>Call Light</h1>

<table>

<tr>
<td>Version</td>
<td>{{ status.version }}</td>
</tr>

<tr>
<td>Hostname</td>
<td>{{ status.hostname }}</td>
</tr>

<tr>
<td>State</td>
<td>{{ status.state }}</td>
</tr>

<tr>
<td>Running</td>
<td>{{ status.running }}</td>
</tr>

<tr>
<td>Peers</td>
<td>{{ status.peer_count }}</td>
</tr>

<tr>
<td>Uptime</td>
<td>{{ status.uptime }} seconds</td>
</tr>

</table>

</body>

</html>
